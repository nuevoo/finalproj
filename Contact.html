<html>
    <head>
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">
    <!--font awesome-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" 
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
     crossorigin="anonymous" referrerpolicy="no-referrer" />
    </head>

<body>
        <div class="main">
            <div class="navbar">
                <div class="icon">
                    <h2 class="logo">RozieLib</h2>
                </div>

                <div class="menu">
                    <ul>
                        <li><a href="Home.html">Home</a></li>
                        <li><a href="About.html">About</a></li>
                        <li><a href="Contact.html">Contact</a></li>
                    </ul>
                </div>
            </div>
           
            <div class="form-header">
                <h1> Contact Us</h1>
                <p> If you have any question and if you need help. You can get in touch with us.<br>
                     We'll provide an assistant immediately.</p> 
            </div>

            <div class="contact-wrapper">
                <div class="contact-info">
                    <h2>Contact Information</h2>
                    <p>This is our contact information:</p>
                    <div class="Mobile">
                        <i class="fa-solid fa-phone-flip"></i>
                        <span>09355884910</span> 
                    </div>
                    <div class="Email">
                        <i class="fa-solid fa-envelope"></i>
                        <span>rozielib19@gmail.com</span> 
                    </div>
                    <div class="Location">
                        <i class="fa-solid fa-location-dot"></i>
                        <span>Antipolo City</span> 
                    </div>
                </div>
                <div class="container">
  
                     <form class="contact-form" action="#" method="post" novalidate>
                    <h2>Send Us a Message</h2>

                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Your full name" required />
                    
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Your email address" required />

                    <label for="subject">Subject</label>
                    <input type="text" id="subject" name="subject" placeholder="Subject of your message" required />

                    <label for="message">Message</label>
                    <textarea id="message" name="message" placeholder="Write your message here..." required></textarea>

                    <button type="submit" class="submit-btn">Submit</button>
                    </form>
                </div>   
            </div>
        </div>
</body>

</html>
